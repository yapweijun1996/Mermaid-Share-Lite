<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<p>Right-click each canvas and "Save image as" to create the icon PNGs.</p>
<h3>192x192</h3>
<canvas id="c192" width="192" height="192"></canvas>
<h3>512x512</h3>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext("2d");

  // Background
  ctx.fillStyle = "#4f46e5";
  const r = s * 0.15;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.fill();

  // Draw a simple flowchart icon
  const cx = s / 2, cy = s / 2;
  const bw = s * 0.28, bh = s * 0.13;

  ctx.strokeStyle = "#fff";
  ctx.fillStyle = "rgba(255,255,255,0.15)";
  ctx.lineWidth = s * 0.02;
  ctx.lineJoin = "round";

  // Top box
  const tx = cx, ty = cy - bh * 1.5;
  ctx.fillRect(tx - bw/2, ty - bh/2, bw, bh);
  ctx.strokeRect(tx - bw/2, ty - bh/2, bw, bh);

  // Bottom-left box
  const lx = cx - bw * 0.7, ly = cy + bh * 1.2;
  ctx.fillRect(lx - bw/2, ly - bh/2, bw, bh);
  ctx.strokeRect(lx - bw/2, ly - bh/2, bw, bh);

  // Bottom-right box
  const rx = cx + bw * 0.7, ry = cy + bh * 1.2;
  ctx.fillRect(rx - bw/2, ry - bh/2, bw, bh);
  ctx.strokeRect(rx - bw/2, ry - bh/2, bw, bh);

  // Arrows
  ctx.beginPath();
  ctx.moveTo(tx, ty + bh/2);
  ctx.lineTo(tx, cy);
  ctx.lineTo(lx, cy);
  ctx.lineTo(lx, ly - bh/2);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(tx, cy);
  ctx.lineTo(rx, cy);
  ctx.lineTo(rx, ry - bh/2);
  ctx.stroke();

  // Arrow heads
  const ah = s * 0.04;
  [lx, rx].forEach(x => {
    const ay = (x === lx ? ly : ry) - bh/2;
    ctx.beginPath();
    ctx.moveTo(x - ah, ay - ah);
    ctx.lineTo(x, ay);
    ctx.lineTo(x + ah, ay - ah);
    ctx.stroke();
  });

  // "M" letter
  ctx.fillStyle = "#fff";
  ctx.font = `bold ${s * 0.12}px sans-serif`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("M", tx, ty);
}

drawIcon(document.getElementById("c192"));
drawIcon(document.getElementById("c512"));

// Auto-download
["c192", "c512"].forEach(id => {
  const canvas = document.getElementById(id);
  const a = document.createElement("a");
  a.download = `icon-${canvas.width}.png`;
  a.href = canvas.toDataURL("image/png");
  a.click();
});
</script>
</body>
</html>
